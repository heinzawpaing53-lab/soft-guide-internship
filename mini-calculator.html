<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Calculator</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #eef2f7;
        font-family: Inter, system-ui, sans-serif;
        color: #111827;
      }

      .card {
        width: min(520px, calc(100% - 32px));
        background: white;
        border-radius: 28px;
        padding: 32px;
        box-shadow: 0 28px 80px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 28px;
        font-size: 1.8rem;
        text-align: center;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 12px;
        margin-bottom: 24px;
      }

      input,
      select {
        width: 100%;
        min-height: 64px;
        border: 1px solid #cbd5e1;
        border-radius: 16px;
        padding: 0 18px;
        font-size: 1.05rem;
        color: #0f172a;
        background: #f8fafc;
        outline: none;
      }

      select {
        max-width: 88px;
        text-align: center;
      }

      option {
        text-align: center;
      }

      .button {
        width: 100%;
        border: none;
        border-radius: 16px;
        background: #2563eb;
        color: white;
        font-size: 1rem;
        font-weight: 700;
        padding: 18px 0;
      }

      .result-card {
        margin-top: 22px;
        border: 1px dashed #cbd5e1;
        border-radius: 16px;
        padding: 18px 20px;
        background: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .result-label {
        font-weight: 700;
        color: #334155;
      }

      .result-value {
        font-size: 1.7rem;
        font-weight: 800;
        color: #15803d;
      }
      .button:hover{
        cursor: pointer;
      }
      #left-num:hover, #right-num:hover{
        cursor: pointer;
      }
    </style>
    <script>
      function calculate(event) {
        event.preventDefault();
        const left = parseFloat(document.getElementById("left-num").value) || 0;
        const right = parseFloat(document.getElementById("right-num").value) || 0;
        const op = document.getElementById("operation").value;
        let result;

        if (op === "+") result = left + right;
        else if (op === "-") result = left - right;
        else if (op === "*") result = left * right;
        else if (op === "/") result = right === 0 ? "Can't Devided By Zero" : left / right;
        else result = 0;

        document.getElementById("result-value").textContent = result;
      }

      window.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("calculator-form");
        form.addEventListener("submit", calculate);
      });
    </script>
  </head>
  <body>
    <main class="card">
      <h1>Mini Calculator</h1>
      <form id="calculator-form">
        <div class="row">
          <input id="left-num" type="number"  />
          <select id="operation">
            <option value="+">+</option>
            <option value="-">−</option>
            <option value="*">×</option>
            <option value="/">÷</option>
          </select>
          <input id="right-num" type="number" />
        </div>
        <button class="button" type="submit">Calculate Amount</button>
        <div class="result-card">
          <span class="result-label">Result:</span>
          <span id="result-value" class="result-value">--</span>
        </div>
      </form>
    </main>
  </body>
</html>
