<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background-color: bisque;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #calculator {
        font-family: Arial, Helvetica, sans-serif;
        background-color: white;
        border-radius: 15px;
        width: 90%;
        max-width: 500px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      #display {
        width: 100%;
        padding: 20px;
        margin-bottom: 100px;
        font-size: 5rem;
        text-align: right;
        border: none;
        background-color: white;
        color: aqua;
        letter-spacing: 2px;
        font-weight: bold;
        overflow-x: auto;
        white-space: nowrap;
        scroll-behavior: smooth;
      }

      #keys {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        padding-left: 13px;
      }

      button {
        height: 100px;
        width: 100px;
        border-radius: 50px;
        border: none;
        background-color: rgb(215, 223, 224);
        color: aqua;
        font-size: 3rem;
        font-weight: bold;
        cursor: pointer;
        margin: 5px;
      }

      .operator-btn {
        color: tomato;
      }

      .operators-btn {
        background-color: tomato;
        color: white;
      }
    </style>
  </head>

  <body>
    <div id="calculator">
      <input id="display"  value="0" />

      <div id="keys">
        <button onclick="clearDisplay()" class="operator-btn">C</button>

        <button onclick="deleteData()" class="operator-btn">⌫</button>

        <button onclick="calculatePercentage()" class="operator-btn">%</button>

        <button onclick="appendToDisplay('/')" class="operator-btn">÷</button>

        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>

        <button onclick="appendToDisplay('*')" class="operator-btn">×</button>

        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>

        <button onclick="appendToDisplay('-')" class="operator-btn">-</button>

        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>

        <button onclick="appendToDisplay('+')" class="operator-btn">+</button>

        <button onclick="appendToDisplay('()')">()</button>

        <button onclick="appendToDisplay('0')">0</button>

        <button onclick="appendToDisplay('.')">.</button>

        <button onclick="calculate()" class="operators-btn">=</button>
      </div>
    </div>

    <script>
      const display = document.getElementById("display");

      function appendToDisplay(input) {
        if (display.value === "0") {
          display.value = "";
        }

        // () button
        if (input === "()") {
          let open = (display.value.match(/\(/g) || []).length;

          let close = (display.value.match(/\)/g) || []).length;

          if (open > close) {
            display.value += ")";
          } else {
            display.value += "(";
          }

          display.scrollLeft = display.scrollWidth;
          return;
        }

        // Prevent multiple decimals
        if (input === ".") {
          let parts = display.value.split(/[\+\-\*\/\(\)]/);

          let currentNumber = parts[parts.length - 1];

          if (currentNumber.includes(".")) {
            return;
          }
        }

        display.value += input;

        // Auto scroll
        display.scrollLeft = display.scrollWidth;
      }

      function deleteData() {
        display.value = display.value.slice(0, -1);

        if (display.value === "") {
          display.value = "0";
        }
      }

      function clearDisplay() {
        display.value = "0";
      }

      function calculate() {
        try {
          // Fix hidden multiplication
          let expression = display.value
            .replace(/(\d)\(/g, "$1*(")
            .replace(/\)(\d)/g, ")*$1")
            .replace(/\)\(/g, ")*(");

          let result = eval(expression);

          if (result === Infinity || result === -Infinity) {
            display.style.fontSize = "3rem";
            display.value = "Can't divide by 0";
          } else {
            display.value = result;
          }
        } catch (error) {
          display.value = "Error";
        }
      }

      function calculatePercentage() {
        display.value = display.value / 100;
      }
    </script>
  </body>
</html>
