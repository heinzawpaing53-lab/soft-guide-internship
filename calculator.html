<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin-top: 50px;
      background-color: bisque;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #calculator {
      font-family: Arial, Helvetica, sans-serif;
      background-color: white;
      border-radius: 15px;
      min-width: 500px;
      max-width: 500px;
      overflow: hidden;
      /* border: 2px solid black; */
    }
    #display {
      width: 100%;
      padding: 20px;
      margin-bottom: 100px;
      font-size: 5rem;
      text-align: right;
      border: none;
      background-color: white;
      color: aqua;
    }
    #keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding-left: 13px;
    }
    button {
      height: 100px;
      width: 100px;
      border-radius: 50px;
      border: none;
      background-color: rgb(215, 223, 224);
      color: aqua;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      margin: 5px;
    }
    .operator-btn {
      color: tomato;
    }
    .operators-btn {
      background-color: tomato;
      columns: white;
    }
  </style>
  <body>
    <div id="calculator">
      <input id="display" readonly />
      <div id="keys">
        <button onclick="clearDisplay()" class="operator-btn">C</button>
        <button onclick="deleteData()" class="operator-btn">⌫</button>
        <button onclick="calculatePercentage()">%</button>
        <button onclick="appendToDisplay('/')" class="operator-btn">÷</button>
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="appendToDisplay('*')" class="operator-btn">x</button>
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('-')" class="operator-btn">-</button>
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="appendToDisplay('+')" class="operator-btn">+</button>
        <button onclick="appendToDisplay('()')">()</button>
        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="appendToDisplay('.')">.</button>
        <button onclick="calculate()" class="operators-btn">=</button>
      </div>
    </div>
    <script>
      const display = document.getElementById("display");

      function appendToDisplay(input) {
        if (display.value == 0) {
          display.value = "";
        }
        display.value += input;
      }
      function deleteData() {
        display.value = display.value.slice(0, -1);
        if (display.value == "") {
          display.value = 0;
        }
      }
      function clearDisplay() {
        display.value = 0;
      }
      function calculate() {
        try {
          let result = eval(display.value);

          if (result === Infinity || result === -Infinity) {
            display.style.fontSize = "3rem";
            display.value = "Can't divide by 0";
          } else {
            display.value = result;
          }
        } catch (error) {
          display.value = "Error";
        }
      }
      function calculatePercentage() {
        display.value = display.value / 100;
      }
    </script>
  </body>
</html>
