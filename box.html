<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        margin-top: 100px;
      }
      .main {
        width: 500px;
        height: 300px;
        border: 2px solid black;
        background-color:blue;
        margin: auto;
        display: flex;
        justify-content: center;
      }
      h1 {
        width: 300px;
        height: 150px;
        border: 1px solid black;
        text-align: center;
        justify-content: center;
        align-items: center;
        display: flex;
        background-color: white;
        margin: auto;
        border-radius: 30px;
      }
      .container {
        width: 400px;
        height: 200px;
        border: 2px solid red;
        border-radius: 12px;
        background-color: yellow;
        display: flex;
        margin: auto;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="container">
        <h1>Contant Card</h1>
      </div>
    </div>
  </body>
</html>
