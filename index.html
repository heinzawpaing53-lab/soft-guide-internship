<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #dfe5ec;
      }

      .container {
        width: 60%;
        margin: 50px auto;
        padding: 35px;
        border-radius: 20px;
        background-color: #ffffff;
        display: flex;
        justify-content: space-between;
        gap: 60px;
      }

      .controls {
        width: 50%;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .controls h2,
      .output h2 {
        font-size: 24px;
        margin-bottom: 20px;
      }

      .controls label {
        font-size: 18px;
        font-weight: bold;
      }

      .controls input[type="text"],
      .controls input[type="number"] {
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 16px;
      }

      .controls input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }

      .controls input[type="color"] {
        width: 45px;
        height: 35px;
        border: none;
        background: none;
      }

      .output {
        width: 50%;
      }

      .card {
        width: 260px;
        margin-top: 40px;
        padding: 20px;
        border-radius: 16px;
        border: 2px solid #444;
        background-color: aliceblue;
        box-shadow: 0 5px 12px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .badge {
        display: inline-block;
        background-color: gold;
        padding: 6px 14px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 13px;
      }

      #cardName {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 12px;
      }

      .card p {
        font-size: 18px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <section class="controls">
        <h2>Update Variables</h2>

        <label for="inputName">Name (String) :</label>
        <input type="text" id="inputName" value="Alex Walker" />

        <label for="inputAge">Age (Number)</label>
        <input type="number" id="inputAge" value="28" />

        <label for="vipInput">VIP Status (Boolean)</label>
        <input type="checkbox" id="vipInput" checked />

        <label for="colorInput">Card Color :</label>
        <input type="color" id="colorInput" value="#f4f4f4" />
      </section>

      <section class="output">
        <h2>Live DOM Output</h2>

        <div class="card" id="idCard">
          <div><span class="badge" id="vipBadge">VIP MEMBER</span></div>

          <div>
            <p id="cardName">Alex Walker</p>
            <p>Age : <span id="cardAge">28</span></p>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
