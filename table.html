<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
        border-collapse: collapse;
        width: 80%;
        margin: auto;
      }
      th {
        background-color: rgb(181, 224, 181);
      }
      th,td {
        border: 2px solid black;
        padding: 6px;
      }
      .num {
        text-align: center;
      }
      .marks {
        text-align: end;
      }
      .gender {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th rowspan="2">No</th>
        <th rowspan="2">Student Name</th>
        <th rowspan="2">Gender</th>
        <th rowspan="2">Roll No.</th>
        <th colspan="3">Marks</th>
      </tr>
      <tr>
        <th>Myanmar</th>
        <th>English</th>
        <th>Maths</th>
      </tr>

      <tr>
        <td class="num">1</td>
        <td>Su Su</td>
        <td rowspan="2" class="gender">Female</td>
        <td>5CS-32</td>
        <td class="marks">60</td>
        <td class="marks">75</td>
        <td class="marks">86</td>
      </tr>

      <tr>
        <td class="num">2</td>
        <td>Moe Moe</td>
        <td>5CS-33</td>
        <td class="marks">78</td>
        <td class="marks">86</td>
        <td class="marks">84</td>
      </tr>

      <tr>
        <td class="num">3</td>
        <td>Kyaw Kyaw</td>
        <td rowspan="3" class="gender">Male</td>
        <td>5CS-34</td>
        <td class="marks">89</td>
        <td class="marks">43</td>
        <td class="marks">86</td>
      </tr>

      <tr>
        <td class="num">4</td>
        <td>Mg Mg</td>
        <td>5CS-35</td>
        <td class="marks">76</td>
        <td class="marks">75</td>
        <td class="marks">75</td>
      </tr>

      <tr>
        <td class="num">5</td>
        <td>Aung Aung</td>
        <td>5CS-36</td>
        <td class="marks">87</td>
        <td class="marks">75</td>
        <td class="marks">86</td>
      </tr>
    </table>
  </body>
</html>
